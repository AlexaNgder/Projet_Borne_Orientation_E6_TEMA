<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Formulaire de contact </title>
<link href="styles.css" rel="stylesheet" type="text/css" media="screen" />
    <script src="script.js"></script>
</head>

<body>
<article id="formulaire">
	<h1>MOI JE ME DEPLACE</h1>
	<form id="frmContact" action="#" method="post">
		<fieldset>
			<label for="name">Nom et prénom :</label>
			<input type="text" id="name" placeholder="Saisissez votre nom et prénom" />

			<label for="email">Email :</label>
			<input type="email" id="email" placeholder="Saisissez votre email" />
			
			<label for="telephone">Téléphone :</label>
			<input type="tel" id="telephone" placeholder="Saisissez votre téléphone" />

			<label for="message">Message:</label>
			<textarea id="message" placeholder="Ecrivez ici votre message"></textarea>

			<input type="submit" value="Envoyer" />

		</fieldset>
	</form>
</article>
<br>
<br>
<br>
<br>
<br>
<br>
<div><h1>MOI JE RESTE A MA PLACE</h1></div>
</body>
</html>
